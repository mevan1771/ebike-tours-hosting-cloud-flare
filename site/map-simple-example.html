<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Mapbox Map - No Markers</title>
  
  <!-- Mapbox CSS and JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #map { width: 100%; height: 500px; }
  </style>
</head>
<body>
  <!-- Map container -->
  <div id="map"></div>

  <script>
    // Initialize Mapbox
    mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN_HERE';

    // Create map
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/streets-v12', // or 'satellite-v9', 'outdoors-v12', etc.
      center: [80.5, 7.2], // Sri Lanka center [longitude, latitude]
      zoom: 6
    });

    // Add navigation controls (zoom buttons)
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // Optional: Fit to Sri Lanka bounds
    map.on('load', () => {
      const sriLankaBounds = new mapboxgl.LngLatBounds(
        [79.4, 5.6], // Southwest corner
        [82.0, 9.9]  // Northeast corner
      );
      map.fitBounds(sriLankaBounds, { padding: 50 });
    });
  </script>
</body>
</html>
